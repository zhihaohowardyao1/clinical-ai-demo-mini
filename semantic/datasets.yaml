# Vendor-neutral dataset catalog for the demo semantic layer.
# These dataset names are logical names for presentation and planning.
# They are based on the synthetic clinical trial demo already present in the repo.

version: 0.1

datasets:
  - id: enrollment_events
    label: Enrollment Events
    domain: enrollment
    status: demo
    description: >
      Synthetic operational enrollment records used by the enrollment monitoring
      demo. This dataset represents screening, approval, enrollment, and
      randomization-style workflow stages for sample subjects and sites.
    source_pages:
      - Enrollment-Monitoring
    grain: one operational status event per synthetic subject per workflow step
    primary_keys:
      - subject_id
      - workflow_stage
    key_fields:
      - name: subject_id
        maps_to: synthetic subject identifier
      - name: site_id
        maps_to: enrollment site label
      - name: workflow_stage
        maps_to: operational stage such as consented or randomized
      - name: status_date
        maps_to: synthetic stage timing if materialized later

  - id: adsl_subject_level
    label: ADSL Subject-Level Dataset
    domain: demographics
    status: demo
    description: >
      Synthetic subject-level dataset generated by the ADaM Datasets page.
      It contains demographics, treatment assignment, site, and baseline flags.
    source_pages:
      - ADaM-Datasets
      - Demographic-Table
    grain: one row per synthetic subject
    primary_keys:
      - USUBJID
    key_fields:
      - name: USUBJID
        maps_to: synthetic subject identifier
      - name: SITE
        maps_to: site
      - name: SEX
        maps_to: sex
      - name: AGE
        maps_to: age
      - name: RACE
        maps_to: race
      - name: FLG1
        maps_to: demo biomarker flag
      - name: TRTEMFL
        maps_to: treatment arm

  - id: adlb_labs_long
    label: ADLB Lab Summary Dataset
    domain: lab_summaries
    status: demo
    description: >
      Synthetic repeated-measure lab or endpoint observations generated across
      visits and parameter codes. The current demo uses endpoint-style PARAMCD
      values and AVAL measurements.
    source_pages:
      - ADaM-Datasets
      - Master-Dataset
    grain: one row per synthetic subject, visit, and parameter
    primary_keys:
      - USUBJID
      - VISIT
      - PARAMCD
    key_fields:
      - name: USUBJID
        maps_to: synthetic subject identifier
      - name: VISIT
        maps_to: visit label such as Visit0, Visit1, Visit2
      - name: PARAMCD
        maps_to: endpoint or lab parameter code
      - name: AVAL
        maps_to: numeric assessment value

  - id: master_subject_analysis
    label: Master Subject Analysis Dataset
    domain: lab_summaries
    status: demo
    description: >
      Synthetic joined wide-format analysis dataset created by combining
      subject-level fields with visit and endpoint measurements.
    source_pages:
      - Master-Dataset
      - Descriptive-Statistics
      - Summerized-Information
      - Primary-Table
      - Followup-Table
    grain: one row per synthetic subject
    primary_keys:
      - USUBJID
    key_fields:
      - name: USUBJID
      - name: treatment_arm
        maps_to: TRTEMFL
      - name: baseline_and_followup_columns
        maps_to: derived wide columns such as Endpoint1_Visit0

  - id: adtte_time_to_event
    label: ADTTE Time-to-Event Dataset
    domain: efficacy_summaries
    status: demo
    description: >
      Synthetic time-to-event dataset used by the efficacy page to illustrate
      progression-free survival style outputs.
    source_pages:
      - Efficacy-Analyses
    grain: one row per synthetic subject and efficacy endpoint
    primary_keys:
      - USUBJID
      - PARAMCD
    key_fields:
      - name: USUBJID
      - name: PARAMCD
      - name: AVAL
        maps_to: event or censoring time
      - name: CNSR
        maps_to: censoring flag

  - id: adrs_response
    label: ADRS Response Dataset
    domain: efficacy_summaries
    status: demo
    description: >
      Synthetic best-response style dataset used by the efficacy page for ORR
      and subgroup response summaries.
    source_pages:
      - Efficacy-Analyses
    grain: one row per synthetic subject and response endpoint
    primary_keys:
      - USUBJID
      - PARAMCD
    key_fields:
      - name: USUBJID
      - name: PARAMCD
      - name: AVALC
        maps_to: categorical response result such as CR, PR, SD, PD, or NE

